  <!-- Always serve the latest version (prevent index.html caching) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script type="text/javascript">
    // ---------- Cache busting / fresh-load guard ----------
    (function() {
      try {
        // 1. Strip any legacy ServiceWorker + CacheStorage from prior versions.
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          }).catch(function() {});
        }
        if (typeof caches !== 'undefined' && caches.keys) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          }).catch(function() {});
        }

        // 2. Build-version reload: if the deployed version.json changed since
        //    the last visit, force-refresh stale tabs. Hashed bundle filenames
        //    already bust correctly on a fresh document load; this catches
        //    long-open tabs that haven't re-fetched index.html yet.
        var VERSION_KEY = 'app.buildVersion';
        var url = 'version.json?_=' + Date.now();
        fetch(url, { cache: 'no-store' })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(data) {
            if (!data || !data.version) return;
            var stored = null;
            try { stored = localStorage.getItem(VERSION_KEY); } catch (e) {}
            if (stored && stored !== String(data.version)) {
              try { localStorage.setItem(VERSION_KEY, String(data.version)); } catch (e) {}
              if (!sessionStorage.getItem('app.reloaded')) {
                sessionStorage.setItem('app.reloaded', '1');
                location.reload();
              }
            } else if (!stored) {
              try { localStorage.setItem(VERSION_KEY, String(data.version)); } catch (e) {}
            } else {
              sessionStorage.removeItem('app.reloaded');
            }
          })
          .catch(function() {});
      } catch (e) { /* no-op */ }
    })();

    // ---------- SPA GitHub Pages redirect handler ----------
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>
<body>
  <app-root></app-root>
</body>
