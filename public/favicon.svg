<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#shine)"/>

  <!-- Pharmacy capsule, tilted -->
  <g transform="rotate(-32 32 32)">
    <path d="M 22 22 H 32 V 42 H 22 A 10 10 0 0 1 22 22 Z" fill="#ffffff"/>
    <path d="M 32 22 H 42 A 10 10 0 0 1 42 42 H 32 Z" fill="#f59e0b"/>
    <rect x="31.25" y="22" width="1.5" height="20" fill="#0d9488" opacity="0.18"/>
    <!-- Highlight on white half -->
    <path d="M 24 25 Q 19 32 24 39" stroke="rgba(20,35,31,0.06)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
